{% extends 'base.html' %}

{% block title %}Редактировать вопрос{% endblock %}

{% block content %}
<div class="form-page-hero" data-aos="fade-up">
    <h1>Редактирование вопроса</h1>
    <p class="mb-0">Тест: {{ question.test.title }}</p>
</div>

<div class="row justify-content-center" data-aos="fade-up" data-aos-delay="100">
    <div class="col-md-8">
        <div class="card form-card">
            <div class="card-body">
                <form method="post">
                    {% csrf_token %}

                    <div class="mb-3">
                        <label class="form-section-label">{{ form.text.label }}</label>
                        {{ form.text }}
                        {{ form.text.errors }}
                    </div>

                    <div class="mb-4">
                        <label class="form-section-label">{{ form.order.label }}</label>
                        {{ form.order }}
                        {{ form.order.errors }}
                    </div>

                    <button type="submit" class="btn btn-success custom-btn">Сохранить</button>
                    <a href="{% url 'test_list' %}" class="btn btn-secondary custom-btn">Назад</a>
                </form>
            </div>
        </div>
    </div>
</div>
{% endblock %}

{% extends 'base.html' %}

{% block title %}Удалить ответ{% endblock %}

{% block content %}
<div class="row justify-content-center" data-aos="zoom-in">
    <div class="col-md-6">
        <div class="card delete-card">
            <div class="card-body p-4">
                <h2 class="delete-title mb-3">Удаление варианта ответа</h2>
                <p>Вы уверены, что хотите удалить этот вариант ответа?</p>
                <h4 class="mb-4">{{ option.text }}</h4>

                <form method="post">
                    {% csrf_token %}
                    <button type="submit" class="btn btn-danger custom-btn">Да, удалить</button>
                    <a href="{% url 'test_list' %}" class="btn btn-secondary custom-btn">Отмена</a>
                </form>
            </div>
        </div>
    </div>
</div>
{% endblock %}
